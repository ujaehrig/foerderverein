name: Deploy Hugo to Hetzner

on:
  push:
    branches:
      - main  # Passen Sie dies an, falls Ihr Hauptbranch 'master' heißt
  workflow_dispatch: # Erlaubt es, das Deployment bei Bedarf manuell in GitHub zu starten

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Repository auschecken
        uses: actions/checkout@v4
        with:
          submodules: true  # Wichtig, falls Ihr Hugo-Theme als Git-Submodule eingebunden ist
          fetch-depth: 0    # Stellt sicher, dass Git-Timestamps für Hugos .GitInfo verfügbar sind

      - name: 🛠️ Hugo installieren
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true    # Auf 'true' lassen, falls Ihr Theme SCSS/SASS kompiliert

      - name: 🏗️ Website bauen
        run: hugo --minify

      - name: 🚀 Upload zu Hetzner (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./public/
          # WICHTIG: Pfad bei Hetzner. Für die Hauptdomain meist /public_html/
          # Für Zusatzdomains oft ein Unterordner wie /public_html/die-foerderer.net/
          server-dir: /public_html/ 
          
          # Optional, aber empfohlen für sichere Deployments:
          # Löscht Dateien auf dem Server, die lokal nicht mehr im public-Ordner existieren.
          state-name: .ftp-deploy-sync-state.json